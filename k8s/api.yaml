apiVersion: v1
kind: Service
metadata:
  name: maoning-api
  namespace: maoning
spec:
  selector:
    app: maoning-api
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maoning-api
  namespace: maoning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maoning-api
  template:
    metadata:
      labels:
        app: maoning-api
    spec:
      volumes:
        - name: app-code
          emptyDir: {}
      initContainers:
        - name: fetch-source
          image: alpine/git:2.47.2
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              rm -rf /workspace/*
              git clone --depth=1 https://github.com/luxuyuan-candi/NJY_MaoNing_Be.git /workspace
          volumeMounts:
            - name: app-code
              mountPath: /workspace
      containers:
        - name: maoning-api
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              pip install --no-cache-dir -r /workspace/requirements.txt && \
              cd /workspace && \
              gunicorn --bind 0.0.0.0:5000 app:app
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: maoning-api-config
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: maoning-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: maoning-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: maoning-secret
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: app-code
              mountPath: /workspace
