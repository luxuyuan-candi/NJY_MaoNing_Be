apiVersion: v1
kind: Service
metadata:
  name: maoning-api
  namespace: maoning
spec:
  type: NodePort
  selector:
    app: maoning-api
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maoning-api
  namespace: maoning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maoning-api
  template:
    metadata:
      labels:
        app: maoning-api
    spec:
      containers:
        - name: maoning-api
          image: maoning-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: maoning-api-config
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: maoning-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: maoning-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: maoning-secret
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
