apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maoning-minio-public
  namespace: maoning
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.njwjxy.cn
      secretName: ingress-tls
  rules:
    - host: www.njwjxy.cn
      http:
        paths:
          - path: /maoning-public-assets(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: minio
                port:
                  number: 9000
